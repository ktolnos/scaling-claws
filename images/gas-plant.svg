<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44" width="40" height="44">
  <!-- Main building -->
  <rect x="4" y="18" width="24" height="18" rx="1" fill="#3a3530" stroke="#2a2520" stroke-width="0.5"/>
  <!-- Smokestack -->
  <rect x="28" y="4" width="6" height="32" rx="1" fill="#4a4540" stroke="#3a3530" stroke-width="0.5"/>
  <!-- Stack rings -->
  <rect x="27" y="6" width="8" height="2" rx="0.5" fill="#5a5550"/>
  <rect x="27" y="20" width="8" height="2" rx="0.5" fill="#5a5550"/>
  <!-- Smoke puffs -->
  <circle cx="31" cy="3" r="2.5" fill="#778" opacity="0.3">
    <animate attributeName="cy" values="3;-4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="2" r="2" fill="#889" opacity="0.25">
    <animate attributeName="cy" values="2;-6" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Turbine housing -->
  <rect x="8" y="20" width="16" height="8" rx="1" fill="#444038"/>
  <!-- Windows -->
  <rect x="6" y="22" width="3" height="3" rx="0.3" fill="#5a6a4a" opacity="0.6"/>
  <rect x="11" y="22" width="3" height="3" rx="0.3" fill="#5a6a4a" opacity="0.6"/>
  <!-- Pipes -->
  <rect x="2" y="28" width="28" height="2" rx="1" fill="#555"/>
  <rect x="2" y="32" width="20" height="1.5" rx="0.75" fill="#555"/>
  <!-- Door -->
  <rect x="18" y="30" width="6" height="6" rx="0.5" fill="#1a1a1a" stroke="#333" stroke-width="0.3"/>
  <!-- Warning light -->
  <circle cx="7" cy="19" r="1" fill="#e9a845">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Ground -->
  <rect x="0" y="36" width="40" height="8" fill="#2a3a2a"/>
  <!-- Fence -->
  <line x1="1" y1="36" x2="1" y2="32" stroke="#666" stroke-width="0.4"/>
  <line x1="5" y1="36" x2="5" y2="32" stroke="#666" stroke-width="0.4"/>
  <line x1="1" y1="33" x2="5" y2="33" stroke="#666" stroke-width="0.3"/>
</svg>
