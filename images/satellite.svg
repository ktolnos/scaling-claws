<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 12" width="24" height="12">
  <!-- Solar panel left -->
  <rect x="0" y="3" width="8" height="6" rx="0.3" fill="#2244aa" stroke="#1a3388" stroke-width="0.3"/>
  <line x1="2" y1="3" x2="2" y2="9" stroke="#1a3388" stroke-width="0.2"/>
  <line x1="4" y1="3" x2="4" y2="9" stroke="#1a3388" stroke-width="0.2"/>
  <line x1="6" y1="3" x2="6" y2="9" stroke="#1a3388" stroke-width="0.2"/>
  <line x1="0" y1="6" x2="8" y2="6" stroke="#1a3388" stroke-width="0.2"/>
  <!-- Body -->
  <rect x="8" y="2" width="8" height="8" rx="1" fill="#aab" stroke="#889" stroke-width="0.3"/>
  <!-- GPU glow inside -->
  <rect x="9.5" y="3.5" width="5" height="5" rx="0.5" fill="#334"/>
  <rect x="10" y="4" width="4" height="4" rx="0.3" fill="#4ecca3" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
  </rect>
  <!-- Solar panel right -->
  <rect x="16" y="3" width="8" height="6" rx="0.3" fill="#2244aa" stroke="#1a3388" stroke-width="0.3"/>
  <line x1="18" y1="3" x2="18" y2="9" stroke="#1a3388" stroke-width="0.2"/>
  <line x1="20" y1="3" x2="20" y2="9" stroke="#1a3388" stroke-width="0.2"/>
  <line x1="22" y1="3" x2="22" y2="9" stroke="#1a3388" stroke-width="0.2"/>
  <line x1="16" y1="6" x2="24" y2="6" stroke="#1a3388" stroke-width="0.2"/>
  <!-- Antenna -->
  <line x1="12" y1="2" x2="12" y2="0" stroke="#888" stroke-width="0.3"/>
  <circle cx="12" cy="0" r="0.5" fill="#e94560"/>
</svg>
