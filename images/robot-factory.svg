<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 40" width="48" height="40">
  <!-- Factory building -->
  <rect x="2" y="12" width="44" height="24" rx="1" fill="#3a3a44" stroke="#2a2a34" stroke-width="0.5"/>
  <!-- Sawtooth roof -->
  <polygon points="2,12 14,4 14,12" fill="#4a4a54" stroke="#3a3a44" stroke-width="0.3"/>
  <polygon points="14,12 26,4 26,12" fill="#4a4a54" stroke="#3a3a44" stroke-width="0.3"/>
  <polygon points="26,12 38,4 38,12" fill="#4a4a54" stroke="#3a3a44" stroke-width="0.3"/>
  <!-- Roof windows -->
  <polygon points="5,12 12,6 12,12" fill="#3a5a6a" opacity="0.5"/>
  <polygon points="17,12 24,6 24,12" fill="#3a5a6a" opacity="0.5"/>
  <polygon points="29,12 36,6 36,12" fill="#3a5a6a" opacity="0.5"/>
  <!-- Assembly window - robot being built -->
  <rect x="6" y="16" width="14" height="10" rx="0.5" fill="#1a2a3a"/>
  <!-- Robot on assembly line (inside window) -->
  <!-- Robot head -->
  <rect x="11" y="17" width="4" height="3" rx="0.5" fill="#7a8a9a"/>
  <circle cx="12.2" cy="18.5" r="0.5" fill="#4ecca3"/>
  <circle cx="13.8" cy="18.5" r="0.5" fill="#4ecca3"/>
  <!-- Robot body -->
  <rect x="10.5" y="20.5" width="5" height="4" rx="0.3" fill="#6a7a8a"/>
  <!-- Robotic arm (assembly) -->
  <line x1="7" y1="18" x2="10" y2="19" stroke="#e9a845" stroke-width="0.8">
    <animate attributeName="x2" values="10;11;10" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="7" cy="18" r="1" fill="#555"/>
  <!-- Conveyor door -->
  <rect x="24" y="20" width="18" height="10" rx="0.5" fill="#1a1a24" stroke="#333" stroke-width="0.3"/>
  <!-- Conveyor belt dots (moving) -->
  <circle cx="26" cy="28" r="0.8" fill="#555">
    <animate attributeName="cx" values="26;42;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="28" r="0.8" fill="#555">
    <animate attributeName="cx" values="32;42;26;32" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Status sign -->
  <rect x="38" y="14" width="6" height="4" rx="0.5" fill="#1a2a1a" stroke="#333" stroke-width="0.3"/>
  <text x="41" y="17" text-anchor="middle" font-size="3" fill="#4ecca3" font-family="monospace">ON</text>
  <!-- Chimney -->
  <rect x="40" y="6" width="3" height="8" fill="#4a4a54"/>
  <!-- Antenna -->
  <line x1="44" y1="4" x2="44" y2="12" stroke="#777" stroke-width="0.5"/>
  <circle cx="44" cy="4" r="0.8" fill="#e94560">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Ground -->
  <rect x="0" y="36" width="48" height="4" fill="#2a3a2a"/>
</svg>
