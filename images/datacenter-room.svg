<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Floor -->
  <rect x="0" y="60" width="200" height="20" fill="#1a1a24"/>
  <!-- Floor tiles -->
  <g stroke="#222230" stroke-width="0.3" opacity="0.5">
    <line x1="0" y1="65" x2="200" y2="65"/>
    <line x1="0" y1="70" x2="200" y2="70"/>
    <line x1="0" y1="75" x2="200" y2="75"/>
    <line x1="20" y1="60" x2="20" y2="80"/><line x1="40" y1="60" x2="40" y2="80"/>
    <line x1="60" y1="60" x2="60" y2="80"/><line x1="80" y1="60" x2="80" y2="80"/>
    <line x1="100" y1="60" x2="100" y2="80"/><line x1="120" y1="60" x2="120" y2="80"/>
    <line x1="140" y1="60" x2="140" y2="80"/><line x1="160" y1="60" x2="160" y2="80"/>
    <line x1="180" y1="60" x2="180" y2="80"/>
  </g>
  <!-- Ceiling -->
  <rect x="0" y="0" width="200" height="8" fill="#2a2a34"/>
  <!-- Ceiling lights -->
  <rect x="20" y="6" width="30" height="2" rx="0.5" fill="#4a5a6a" opacity="0.5"/>
  <rect x="70" y="6" width="30" height="2" rx="0.5" fill="#4a5a6a" opacity="0.5"/>
  <rect x="120" y="6" width="30" height="2" rx="0.5" fill="#4a5a6a" opacity="0.5"/>
  <rect x="170" y="6" width="20" height="2" rx="0.5" fill="#4a5a6a" opacity="0.5"/>
  <!-- Light glow -->
  <rect x="22" y="6" width="26" height="1" fill="#8ab" opacity="0.2"/>
  <rect x="72" y="6" width="26" height="1" fill="#8ab" opacity="0.2"/>
  <rect x="122" y="6" width="26" height="1" fill="#8ab" opacity="0.2"/>
  
  <!-- Back wall -->
  <rect x="0" y="8" width="200" height="52" fill="#1e1e28"/>
  
  <!-- === DESK AREA (leftmost - early game) === -->
  <!-- Desk -->
  <rect x="10" y="42" width="30" height="2" rx="0.5" fill="#5a4a3a"/>
  <rect x="12" y="44" width="2" height="16" fill="#4a3a2a"/>
  <rect x="36" y="44" width="2" height="16" fill="#4a3a2a"/>
  <!-- Laptop on desk -->
  <rect x="16" y="34" width="16" height="10" rx="1" fill="#333" stroke="#222" stroke-width="0.3"/>
  <rect x="17" y="35" width="14" height="7" rx="0.5" fill="#1a1a2e"/>
  <rect x="18" y="36" width="6" height="1" rx="0.3" fill="#4ecca3" opacity="0.7"/>
  <rect x="18" y="38" width="9" height="1" rx="0.3" fill="#4ecca3" opacity="0.5"/>
  <!-- Coffee cup -->
  <rect x="34" y="38" width="3" height="4" rx="0.5" fill="#8a6a4a"/>
  <!-- Chair -->
  <ellipse cx="25" cy="54" rx="6" ry="3" fill="#3a3a4a"/>
  
  <!-- === MIC-MINI STACK (next to desk) === -->
  <rect x="45" y="46" width="8" height="14" rx="1" fill="#2d2d3d" stroke="#444" stroke-width="0.3"/>
  <circle cx="49" cy="50" r="1" fill="#4ecca3" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <rect x="45" y="34" width="8" height="12" rx="1" fill="#2d2d3d" stroke="#444" stroke-width="0.3"/>
  <circle cx="49" cy="38" r="1" fill="#4ecca3" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- === SERVER RACKS (mid-game) === -->
  <!-- Rack 1 -->
  <rect x="62" y="12" width="18" height="48" rx="1" fill="#1a1a24" stroke="#333" stroke-width="0.5"/>
  <rect x="64" y="14" width="14" height="4" rx="0.5" fill="#252535"/>
  <circle cx="66" cy="16" r="0.8" fill="#4ecca3" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.8s" repeatCount="indefinite"/></circle>
  <rect x="64" y="20" width="14" height="4" rx="0.5" fill="#252535"/>
  <circle cx="66" cy="22" r="0.8" fill="#4ecca3" opacity="0.8"><animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.1s" repeatCount="indefinite"/></circle>
  <rect x="64" y="26" width="14" height="4" rx="0.5" fill="#252535"/>
  <circle cx="66" cy="28" r="0.8" fill="#4ecca3" opacity="0.8"><animate attributeName="opacity" values="0.8;0.4;0.8" dur="1.5s" repeatCount="indefinite"/></circle>
  <rect x="64" y="32" width="14" height="4" rx="0.5" fill="#252535"/>
  <rect x="64" y="38" width="14" height="4" rx="0.5" fill="#252535"/>
  <rect x="64" y="44" width="14" height="4" rx="0.5" fill="#252535"/>
  <rect x="64" y="50" width="14" height="4" rx="0.5" fill="#252535"/>
  
  <!-- Rack 2 -->
  <rect x="84" y="12" width="18" height="48" rx="1" fill="#1a1a24" stroke="#333" stroke-width="0.5"/>
  <rect x="86" y="14" width="14" height="4" rx="0.5" fill="#252535"/>
  <circle cx="88" cy="16" r="0.8" fill="#4ecca3" opacity="0.8"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.9s" repeatCount="indefinite"/></circle>
  <rect x="86" y="20" width="14" height="4" rx="0.5" fill="#252535"/>
  <circle cx="88" cy="22" r="0.8" fill="#e94560" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.8;0.2;0.6" dur="0.4s" repeatCount="indefinite"/></circle>
  <rect x="86" y="26" width="14" height="4" rx="0.5" fill="#252535"/>
  <rect x="86" y="32" width="14" height="4" rx="0.5" fill="#252535"/>
  <rect x="86" y="38" width="14" height="4" rx="0.5" fill="#252535"/>
  <rect x="86" y="44" width="14" height="4" rx="0.5" fill="#111118" stroke="#2a2a3a" stroke-width="0.2" stroke-dasharray="1,1"/>
  <rect x="86" y="50" width="14" height="4" rx="0.5" fill="#111118" stroke="#2a2a3a" stroke-width="0.2" stroke-dasharray="1,1"/>
  
  <!-- Rack 3 -->
  <rect x="106" y="12" width="18" height="48" rx="1" fill="#1a1a24" stroke="#333" stroke-width="0.5"/>
  <rect x="108" y="14" width="14" height="4" rx="0.5" fill="#252535"/>
  <circle cx="110" cy="16" r="0.8" fill="#4ecca3" opacity="0.8"><animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.2s" repeatCount="indefinite"/></circle>
  <rect x="108" y="20" width="14" height="4" rx="0.5" fill="#252535"/>
  <rect x="108" y="26" width="14" height="4" rx="0.5" fill="#252535"/>
  <rect x="108" y="32" width="14" height="4" rx="0.5" fill="#111118" stroke="#2a2a3a" stroke-width="0.2" stroke-dasharray="1,1"/>
  <rect x="108" y="38" width="14" height="4" rx="0.5" fill="#111118" stroke="#2a2a3a" stroke-width="0.2" stroke-dasharray="1,1"/>
  <rect x="108" y="44" width="14" height="4" rx="0.5" fill="#111118" stroke="#2a2a3a" stroke-width="0.2" stroke-dasharray="1,1"/>
  <rect x="108" y="50" width="14" height="4" rx="0.5" fill="#111118" stroke="#2a2a3a" stroke-width="0.2" stroke-dasharray="1,1"/>
  
  <!-- === COOLING / INFRASTRUCTURE === -->
  <!-- Cable tray overhead -->
  <rect x="60" y="9" width="70" height="1.5" fill="#333" opacity="0.6"/>
  <!-- Cables hanging -->
  <path d="M65,10 Q65,12 66,12" stroke="#44a" stroke-width="0.5" fill="none"/>
  <path d="M87,10 Q87,12 88,12" stroke="#a44" stroke-width="0.5" fill="none"/>
  <path d="M109,10 Q109,12 110,12" stroke="#44a" stroke-width="0.5" fill="none"/>
  
  <!-- === FULL ROOM (late game, right side) === -->
  <!-- More racks fading into distance -->
  <rect x="130" y="16" width="14" height="44" rx="1" fill="#1a1a24" stroke="#2a2a34" stroke-width="0.3" opacity="0.8"/>
  <rect x="132" y="18" width="10" height="3" rx="0.3" fill="#252535" opacity="0.8"/>
  <rect x="132" y="23" width="10" height="3" rx="0.3" fill="#252535" opacity="0.8"/>
  <rect x="132" y="28" width="10" height="3" rx="0.3" fill="#252535" opacity="0.8"/>
  <rect x="132" y="33" width="10" height="3" rx="0.3" fill="#252535" opacity="0.8"/>
  <rect x="132" y="38" width="10" height="3" rx="0.3" fill="#252535" opacity="0.8"/>
  <rect x="132" y="43" width="10" height="3" rx="0.3" fill="#252535" opacity="0.8"/>
  <rect x="132" y="48" width="10" height="3" rx="0.3" fill="#252535" opacity="0.8"/>
  
  <rect x="148" y="18" width="12" height="42" rx="1" fill="#1a1a24" stroke="#2a2a34" stroke-width="0.3" opacity="0.6"/>
  <rect x="150" y="20" width="8" height="3" rx="0.3" fill="#252535" opacity="0.6"/>
  <rect x="150" y="25" width="8" height="3" rx="0.3" fill="#252535" opacity="0.6"/>
  <rect x="150" y="30" width="8" height="3" rx="0.3" fill="#252535" opacity="0.6"/>
  <rect x="150" y="35" width="8" height="3" rx="0.3" fill="#252535" opacity="0.6"/>
  
  <rect x="164" y="20" width="10" height="40" rx="1" fill="#1a1a24" stroke="#2a2a34" stroke-width="0.2" opacity="0.4"/>
  <rect x="178" y="22" width="8" height="38" rx="1" fill="#1a1a24" stroke="#2a2a34" stroke-width="0.2" opacity="0.25"/>
  <rect x="190" y="24" width="6" height="36" rx="1" fill="#1a1a24" stroke="#2a2a34" stroke-width="0.1" opacity="0.15"/>
  
  <!-- Aisle lighting (blue LED strips between racks) -->
  <line x1="82" y1="60" x2="82" y2="12" stroke="#3388ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="104" y1="60" x2="104" y2="12" stroke="#3388ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="128" y1="60" x2="128" y2="16" stroke="#3388ff" stroke-width="0.5" opacity="0.1"/>
  <line x1="146" y1="60" x2="146" y2="18" stroke="#3388ff" stroke-width="0.5" opacity="0.07"/>
</svg>
