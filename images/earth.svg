<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="earthGrad" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#4a8adf"/>
      <stop offset="100%" stop-color="#1a3a6a"/>
    </radialGradient>
    <radialGradient id="atmoGrad" cx="50%" cy="50%">
      <stop offset="85%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#6ab4ff" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
  <!-- Ocean -->
  <circle cx="32" cy="32" r="28" fill="url(#earthGrad)"/>
  <!-- Continents (simplified) -->
  <!-- North America-ish -->
  <path d="M18,16 Q22,14 24,16 Q26,18 28,17 Q30,16 30,20 Q28,24 24,26 Q20,28 18,24 Q16,20 18,16Z" fill="#3a7a3a" opacity="0.7"/>
  <!-- South America-ish -->
  <path d="M24,30 Q26,28 28,30 Q30,34 28,38 Q26,42 24,40 Q22,36 24,30Z" fill="#3a7a3a" opacity="0.7"/>
  <!-- Europe/Africa-ish -->
  <path d="M34,14 Q36,12 38,14 Q40,16 38,18 Q36,20 36,24 Q38,28 36,32 Q34,36 32,34 Q30,30 32,26 Q34,22 34,18 Q32,16 34,14Z" fill="#3a7a3a" opacity="0.7"/>
  <!-- Asia-ish -->
  <path d="M38,16 Q42,14 46,16 Q48,20 46,24 Q44,26 40,24 Q38,22 38,18Z" fill="#3a7a3a" opacity="0.65"/>
  <!-- Clouds -->
  <ellipse cx="22" cy="20" rx="6" ry="2" fill="white" opacity="0.2">
    <animate attributeName="cx" values="22;26;22" dur="20s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="38" cy="30" rx="5" ry="1.5" fill="white" opacity="0.15">
    <animate attributeName="cx" values="38;34;38" dur="25s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="30" cy="42" rx="8" ry="2" fill="white" opacity="0.2">
    <animate attributeName="cx" values="30;36;30" dur="30s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Atmosphere glow -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#6ab4ff" stroke-width="2" opacity="0.15"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#6ab4ff" stroke-width="1" opacity="0.08"/>
</svg>
