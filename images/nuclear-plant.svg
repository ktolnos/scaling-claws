<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 44" width="48" height="44">
  <!-- Containment dome -->
  <ellipse cx="16" cy="24" rx="12" ry="16" fill="#5a6070" stroke="#4a5060" stroke-width="0.5"/>
  <!-- Dome highlight -->
  <ellipse cx="13" cy="18" rx="5" ry="8" fill="#6a7080" opacity="0.4"/>
  <!-- Dome base -->
  <rect x="4" y="28" width="24" height="8" rx="1" fill="#4a5060"/>
  <!-- Cooling tower -->
  <path d="M32,8 Q36,14 34,28 L42,28 Q40,14 44,8 Z" fill="#6a7080" stroke="#5a6070" stroke-width="0.5"/>
  <!-- Cooling tower top opening -->
  <ellipse cx="38" cy="8" rx="6" ry="1.5" fill="#556" stroke="#445" stroke-width="0.3"/>
  <!-- Steam from cooling tower -->
  <circle cx="38" cy="5" r="3" fill="#aab" opacity="0.2">
    <animate attributeName="cy" values="5;-4" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="37" cy="4" r="2.5" fill="#99a" opacity="0.15">
    <animate attributeName="cy" values="4;-5" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Reactor glow -->
  <circle cx="16" cy="22" r="4" fill="#3a8aff" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;4.5;3.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Auxiliary building -->
  <rect x="30" y="28" width="14" height="8" rx="1" fill="#4a5060"/>
  <!-- Power lines leaving -->
  <line x1="44" y1="30" x2="48" y2="28" stroke="#888" stroke-width="0.5"/>
  <line x1="44" y1="32" x2="48" y2="30" stroke="#888" stroke-width="0.5"/>
  <!-- Ground -->
  <rect x="0" y="36" width="48" height="8" fill="#2a3a2a"/>
  <!-- Warning symbol -->
  <circle cx="16" cy="30" r="2" fill="#e9c845" opacity="0.8"/>
  <text x="16" y="31.5" text-anchor="middle" font-size="3" fill="#333">☢</text>
</svg>
