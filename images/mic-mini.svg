<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 40" width="24" height="40">
  <!-- Mini PC case -->
  <rect x="2" y="4" width="20" height="32" rx="2" fill="#2d2d3d" stroke="#444" stroke-width="0.5"/>
  <!-- Front panel darker -->
  <rect x="3" y="5" width="18" height="30" rx="1.5" fill="#252535"/>
  <!-- Vent grilles top -->
  <line x1="6" y1="8" x2="18" y2="8" stroke="#3a3a4a" stroke-width="0.8"/>
  <line x1="6" y1="10" x2="18" y2="10" stroke="#3a3a4a" stroke-width="0.8"/>
  <line x1="6" y1="12" x2="18" y2="12" stroke="#3a3a4a" stroke-width="0.8"/>
  <line x1="6" y1="14" x2="18" y2="14" stroke="#3a3a4a" stroke-width="0.8"/>
  <!-- Power button -->
  <circle cx="12" cy="19" r="2.5" fill="#1a1a2a" stroke="#555" stroke-width="0.5"/>
  <circle cx="12" cy="19" r="1.5" fill="#4ecca3" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Activity LEDs -->
  <circle cx="8" cy="25" r="1" fill="#e94560">
    <animate attributeName="opacity" values="1;0.2;0.8;0.1;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="25" r="1" fill="#4ecca3" opacity="0.6"/>
  <!-- USB ports -->
  <rect x="7" y="29" width="4" height="2" rx="0.5" fill="#1a1a2a" stroke="#555" stroke-width="0.3"/>
  <rect x="13" y="29" width="4" height="2" rx="0.5" fill="#1a1a2a" stroke="#555" stroke-width="0.3"/>
  <!-- Feet -->
  <rect x="4" y="36" width="4" height="1" rx="0.5" fill="#444"/>
  <rect x="16" y="36" width="4" height="1" rx="0.5" fill="#444"/>
</svg>
