<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="64" height="48">
  <!-- Laptop base -->
  <rect x="8" y="28" width="48" height="4" rx="1" fill="#555" stroke="#333" stroke-width="0.5"/>
  <!-- Laptop screen bezel -->
  <rect x="14" y="8" width="36" height="22" rx="2" fill="#333" stroke="#222" stroke-width="0.5"/>
  <!-- Screen -->
  <rect x="16" y="10" width="32" height="18" rx="1" fill="#1a1a2e"/>
  <!-- Screen content: terminal lines -->
  <rect x="18" y="12" width="16" height="1.5" rx="0.5" fill="#4ecca3" opacity="0.9"/>
  <rect x="18" y="15" width="22" height="1.5" rx="0.5" fill="#4ecca3" opacity="0.6"/>
  <rect x="18" y="18" width="12" height="1.5" rx="0.5" fill="#4ecca3" opacity="0.7"/>
  <rect x="18" y="21" width="18" height="1.5" rx="0.5" fill="#e94560" opacity="0.5"/>
  <!-- Blinking cursor -->
  <rect x="18" y="24" width="2" height="1.5" fill="#4ecca3">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Keyboard hint -->
  <rect x="18" y="29" width="28" height="2" rx="0.5" fill="#444"/>
  <!-- Power LED -->
  <circle cx="32" cy="31" r="0.8" fill="#4ecca3">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Hinge shadow -->
  <line x1="14" y1="30" x2="50" y2="30" stroke="#222" stroke-width="0.5"/>
</svg>
