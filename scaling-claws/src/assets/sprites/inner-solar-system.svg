<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- Deep space background -->
  <rect x="0" y="0" width="200" height="100" fill="#060610"/>
  <!-- Stars -->
  <circle cx="12" cy="5" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="38" cy="15" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="75" cy="8" r="0.3" fill="white" opacity="0.3"/>
  <circle cx="120" cy="3" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="155" cy="18" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="185" cy="10" r="0.4" fill="white" opacity="0.6"/>
  <circle cx="25" cy="88" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="92" cy="92" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="140" cy="85" r="0.3" fill="white" opacity="0.3"/>
  <circle cx="175" cy="90" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="50" cy="50" r="0.3" fill="#aaccff" opacity="0.3"/>
  <circle cx="170" cy="60" r="0.3" fill="#ffccaa" opacity="0.3"/>
  <circle cx="100" cy="70" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="60" cy="30" r="0.3" fill="white" opacity="0.3"/>
  <circle cx="145" cy="40" r="0.3" fill="white" opacity="0.4"/>
  
  <!-- Sun (left side, partially visible) -->
  <defs>
    <radialGradient id="sg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="30%" stop-color="#ffcc33"/>
      <stop offset="60%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </radialGradient>
  </defs>
  <!-- Corona -->
  <circle cx="10" cy="50" r="40" fill="#ff8800" opacity="0.03">
    <animate attributeName="r" values="38;44;38" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="10" cy="50" r="32" fill="#ffaa33" opacity="0.05">
    <animate attributeName="r" values="30;35;30" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Sun body -->
  <circle cx="10" cy="50" r="24" fill="url(#sg)"/>
  <!-- Surface detail -->
  <circle cx="18" cy="44" r="3" fill="#ffe066" opacity="0.2"/>
  <circle cx="14" cy="56" r="2" fill="#ffe066" opacity="0.15"/>
  
  <!-- Mercury orbit (near Sun) -->
  <ellipse cx="10" cy="50" rx="42" ry="38" fill="none" stroke="#334" stroke-width="0.3" stroke-dasharray="2,4" opacity="0.3"/>
  <!-- Mercury -->
  <circle cx="48" cy="30" r="3" fill="#8a8078">
    <animate attributeName="cx" values="48;52;48;44;48" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;50;70;50;30" dur="15s" repeatCount="indefinite"/>
  </circle>
  <!-- Mercury mining glow -->
  <circle cx="48" cy="30" r="4" fill="#e9a845" opacity="0.15">
    <animate attributeName="cx" values="48;52;48;44;48" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;50;70;50;30" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Venus orbit -->
  <ellipse cx="10" cy="50" rx="72" ry="62" fill="none" stroke="#334" stroke-width="0.3" stroke-dasharray="2,4" opacity="0.2"/>
  
  <!-- Earth orbit -->
  <ellipse cx="10" cy="50" rx="110" ry="90" fill="none" stroke="#334" stroke-width="0.3" stroke-dasharray="2,4" opacity="0.2"/>
  <!-- Earth (small at this scale) -->
  <circle cx="118" cy="28" r="3" fill="#4a8adf">
    <animate attributeName="cx" values="118;120;118;116;118" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="28;50;72;50;28" dur="25s" repeatCount="indefinite"/>
  </circle>
  <!-- Earth atmosphere hint -->
  <circle cx="118" cy="28" r="3.8" fill="none" stroke="#6ab4ff" stroke-width="0.3" opacity="0.3">
    <animate attributeName="cx" values="118;120;118;116;118" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="28;50;72;50;28" dur="25s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Dyson Swarm satellites (dots around Sun) -->
  <g opacity="0.6">
    <circle cx="36" cy="42" r="0.6" fill="#ffcc33">
      <animate attributeName="cx" values="36;10;-6;10;36" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="42;22;50;78;42" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="58" r="0.5" fill="#ffcc33">
      <animate attributeName="cx" values="30;-4;30;24;30" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="58;50;42;50;58" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="26" r="0.5" fill="#ffcc33">
      <animate attributeName="cx" values="20;34;20;-6;20" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="26;50;74;50;26" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="24" r="0.4" fill="#ffcc33">
      <animate attributeName="cx" values="8;32;8;-12;8" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="24;46;76;50;24" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="70" r="0.5" fill="#ffcc33">
      <animate attributeName="cx" values="28;-8;28;38;28" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="70;50;30;50;70" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Mass driver streak (Mercury to Sun orbit) -->
  <line x1="48" y1="35" x2="35" y2="40" stroke="#ffaa33" stroke-width="0.5" opacity="0.4">
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Transfer path Mercury-Earth -->
  <path d="M50,32 Q85,20 116,28" fill="none" stroke="#4a6a8a" stroke-width="0.3" stroke-dasharray="2,3" opacity="0.25"/>
  
  <!-- Dyson swarm percentage label area -->
  <rect x="130" y="80" width="65" height="14" rx="2" fill="#111" opacity="0.6"/>
  <text x="162" y="90" text-anchor="middle" font-size="5" fill="#ffcc33" font-family="monospace">☀ DYSON: 2.4%</text>
</svg>
