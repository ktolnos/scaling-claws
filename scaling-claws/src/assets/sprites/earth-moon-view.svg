<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- Starfield -->
  <rect x="0" y="0" width="200" height="100" fill="#0a0a14"/>
  <circle cx="15" cy="8" r="0.4" fill="white" opacity="0.6"/>
  <circle cx="45" cy="22" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="78" cy="5" r="0.5" fill="white" opacity="0.7"/>
  <circle cx="110" cy="15" r="0.3" fill="white" opacity="0.5"/>
  <circle cx="145" cy="8" r="0.4" fill="white" opacity="0.6"/>
  <circle cx="170" cy="25" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="188" cy="12" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="30" cy="42" r="0.3" fill="white" opacity="0.3"/>
  <circle cx="95" cy="35" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="155" cy="45" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="60" cy="70" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="120" cy="80" r="0.3" fill="white" opacity="0.4"/>
  <circle cx="180" cy="75" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="8" cy="88" r="0.3" fill="white" opacity="0.3"/>
  <circle cx="90" cy="92" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="50" cy="55" r="0.3" fill="#aaccff" opacity="0.4"/>
  <circle cx="130" cy="60" r="0.3" fill="#ffccaa" opacity="0.4"/>
  
  <!-- Earth -->
  <defs>
    <radialGradient id="eg" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#4a8adf"/>
      <stop offset="100%" stop-color="#1a3a6a"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="28" fill="url(#eg)"/>
  <!-- Continents -->
  <path d="M34,36 Q38,34 40,36 Q42,38 44,37 Q46,36 46,40 Q44,44 40,46 Q36,48 34,44 Q32,40 34,36Z" fill="#3a7a3a" opacity="0.6"/>
  <path d="M40,50 Q42,48 44,50 Q46,54 44,58 Q42,62 40,60 Q38,56 40,50Z" fill="#3a7a3a" opacity="0.6"/>
  <path d="M52,34 Q54,32 56,34 Q58,36 56,38 Q54,40 54,44 Q56,48 54,50 Q52,52 50,50 Q48,46 50,42 Q52,38 52,34Z" fill="#3a7a3a" opacity="0.6"/>
  <!-- Clouds -->
  <ellipse cx="40" cy="40" rx="6" ry="2" fill="white" opacity="0.15">
    <animate attributeName="cx" values="40;44;40" dur="20s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="55" cy="52" rx="4" ry="1.5" fill="white" opacity="0.12"/>
  <!-- Atmosphere -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#6ab4ff" stroke-width="1.5" opacity="0.12"/>
  
  <!-- Transfer orbit path (dotted) -->
  <path d="M75,42 Q110,20 150,40" fill="none" stroke="#4a6a8a" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>
  
  <!-- Moon -->
  <defs>
    <radialGradient id="mg" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#c8c8c0"/>
      <stop offset="100%" stop-color="#8a8a80"/>
    </radialGradient>
  </defs>
  <circle cx="158" cy="42" r="12" fill="url(#mg)"/>
  <!-- Moon craters -->
  <circle cx="153" cy="38" r="2.5" fill="#9a9a90" opacity="0.4"/>
  <circle cx="161" cy="36" r="1.5" fill="#9a9a90" opacity="0.3"/>
  <circle cx="159" cy="46" r="3" fill="#9a9a90" opacity="0.35"/>
  <circle cx="155" cy="48" r="1" fill="#9a9a90" opacity="0.3"/>
  <circle cx="164" cy="42" r="1.2" fill="#9a9a90" opacity="0.3"/>
  
  <!-- Satellites orbiting Earth -->
  <g>
    <circle cx="82" cy="40" r="1.2" fill="#4ecca3" opacity="0.8">
      <animate attributeName="cx" values="82;50;18;50;82" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="40;22;50;78;40" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="25" cy="35" r="1" fill="#4ecca3" opacity="0.7">
      <animate attributeName="cx" values="25;50;75;50;25" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="35;75;50;25;35" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="60" cy="20" r="1" fill="#4ecca3" opacity="0.6">
      <animate attributeName="cx" values="60;80;50;20;60" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="20;50;80;50;20" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Small craft on transfer orbit -->
  <rect x="108" y="28" width="3" height="2" rx="0.5" fill="#ccc">
    <animate attributeName="x" values="75;108;140" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="42;26;38" dur="6s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Lunar base indicator (small dots on moon surface) -->
  <circle cx="155" cy="50" r="0.8" fill="#e9a845" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="158" cy="51" r="0.6" fill="#4ecca3" opacity="0.5"/>
  <circle cx="161" cy="50" r="0.6" fill="#4ecca3" opacity="0.5"/>
</svg>
