<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 32" width="48" height="32">
  <!-- Solar panel row 1 -->
  <g transform="translate(2,4)">
    <rect x="0" y="0" width="10" height="7" rx="0.3" fill="#2244aa" stroke="#1a3388" stroke-width="0.3" transform="skewY(-8)"/>
    <!-- Grid lines -->
    <line x1="2.5" y1="0" x2="2.5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <line x1="5" y1="0" x2="5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <line x1="7.5" y1="0" x2="7.5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <!-- Glint -->
    <rect x="1" y="1" width="3" height="1.5" rx="0.2" fill="#88aaff" opacity="0.3" transform="skewY(-8)">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- Post -->
    <line x1="5" y1="7" x2="5" y2="14" stroke="#666" stroke-width="1"/>
  </g>
  
  <!-- Solar panel row 2 -->
  <g transform="translate(16,4)">
    <rect x="0" y="0" width="10" height="7" rx="0.3" fill="#2244aa" stroke="#1a3388" stroke-width="0.3" transform="skewY(-8)"/>
    <line x1="2.5" y1="0" x2="2.5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <line x1="5" y1="0" x2="5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <line x1="7.5" y1="0" x2="7.5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <rect x="6" y="2" width="3" height="1.5" rx="0.2" fill="#88aaff" opacity="0.3" transform="skewY(-8)">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <line x1="5" y1="7" x2="5" y2="14" stroke="#666" stroke-width="1"/>
  </g>
  
  <!-- Solar panel row 3 -->
  <g transform="translate(30,4)">
    <rect x="0" y="0" width="10" height="7" rx="0.3" fill="#2244aa" stroke="#1a3388" stroke-width="0.3" transform="skewY(-8)"/>
    <line x1="2.5" y1="0" x2="2.5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <line x1="5" y1="0" x2="5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <line x1="7.5" y1="0" x2="7.5" y2="7" stroke="#1a3388" stroke-width="0.2" transform="skewY(-8)"/>
    <rect x="3" y="3" width="3" height="1.5" rx="0.2" fill="#88aaff" opacity="0.3" transform="skewY(-8)">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <line x1="5" y1="7" x2="5" y2="14" stroke="#666" stroke-width="1"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="22" width="48" height="10" fill="#3a5a2a"/>
  <!-- Gravel paths -->
  <rect x="12" y="22" width="2" height="10" fill="#5a6a4a" opacity="0.5"/>
  <rect x="28" y="22" width="2" height="10" fill="#5a6a4a" opacity="0.5"/>
</svg>
